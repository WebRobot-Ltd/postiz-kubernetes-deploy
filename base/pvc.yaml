apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postiz-uploads
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # No storageClassName → uses the cluster's default StorageClass (most portable).
  # Pin one per environment via an overlay patch if you need a specific class.
