# OPTIONAL — enable by uncommenting in kustomization.yaml.
# Skip if you expose postiz.webrobot.eu via Caddy (like the rest of the edge) instead
# of a k8s Ingress controller. Adjust ingressClassName / TLS to the cluster's setup.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: postiz
  labels:
    app: postiz
  annotations:
    # nginx example — change to your controller. Postiz uploads media → raise body size.
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
spec:
  ingressClassName: nginx
  rules:
    - host: postiz.webrobot.eu
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: postiz
                port:
                  number: 80
  tls:
    - hosts:
        - postiz.webrobot.eu
      secretName: postiz-tls
