# OPTIONAL, GENERIC example — enable by uncommenting in kustomization.yaml.
# Set ingressClassName to your controller (traefik / nginx / …) and add a `tls:`
# block only if your cluster terminates TLS at the ingress (e.g. via cert-manager).
# A working Traefik example is in overlays/webrobot/ingress.yaml.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: postiz
  labels:
    app: postiz
spec:
  ingressClassName: CHANGE-ME   # e.g. traefik or nginx
  rules:
    - host: postiz.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: postiz
                port:
                  number: 80
