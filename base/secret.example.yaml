# TEMPLATE — copy to `secret.yaml`, fill in, and keep secret.yaml OUT of git
# (see .gitignore). Add it to your kustomization `resources:` (or an overlay).
apiVersion: v1
kind: Secret
metadata:
  name: postiz-secrets
type: Opaque
stringData:
  # Random secret for JWT signing — generate with: openssl rand -hex 32
  JWT_SECRET: "REPLACE_WITH_openssl_rand_hex_32"

  # Full Postgres connection string for Postiz (Prisma).
  DATABASE_URL: "postgresql://USER:PASSWORD@HOST:5432/postiz"

  # ── Per-channel OAuth app credentials (add as each platform app is approved) ──
  # The layer cannot post to a channel without that platform's approved app + tokens.
  # X_API_KEY: ""
  # X_API_SECRET: ""
  # LINKEDIN_CLIENT_ID: ""
  # LINKEDIN_CLIENT_SECRET: ""
  # FACEBOOK_APP_ID: ""
  # FACEBOOK_APP_SECRET: ""
  # MASTODON_CLIENT_ID: ""
  # MASTODON_CLIENT_SECRET: ""
